<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сканер акцизов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    #container {
      position: relative;
      display: inline-block;
    }

    #video {
      width: 90vw;
      height: 90vw;
      max-width: 400px;
      max-height: 400px;
      margin-top: 10px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #444;
    }

    /* Рамка прицела */
    #overlay {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 70%;
      height: 70%;
      border: 3px solid rgba(255,255,255,0.6);
      border-radius: 10px;
      pointer-events: none;
    }

    #counter {
      margin-top: 8px;
      font-size: 18px;
      font-weight: bold;
    }

    #status {
      height: 20px;
      margin-top: 5px;
      font-size: 14px;
    }

    .success {
      color: #4CAF50;
    }

    .duplicate {
      color: #f44336;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
    }

    #list {
      padding: 10px;
    }

    .card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 12px;
      text-align: left;
      border: 1px solid #333;
    }

    .time {
      font-size: 11px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h3>Сканер акцизных марок</h3>

<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <div id="overlay"></div>
</div>

<div id="counter">0</div>
<div id="status"></div>

<div>
  <button onclick="exportExcel()">Экспорт в Excel</button>
</div>

<div id="list"></div>

<script>
  const video = document.getElementById('video');
  const list = document.getElementById('list');
  const counter = document.getElementById('counter');
  const status = document.getElementById('status');

  const scannedSet = new Set();

  function updateCounter() {
    counter.textContent = scannedSet.size;
  }

  function showStatus(text, type) {
    status.textContent = text;
    status.className = type;

    setTimeout(() => {
      status.textContent = '';
      status.className = '';
    }, 1000);
  }

  function getCurrentTime() {
    const now = new Date();
    return now.toLocaleString();
  }

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();

    if (capabilities.zoom) {
      track.applyConstraints({
        advanced: [{ zoom: Math.min(capabilities.zoom.max, 2.5) }]
      });
    }
  }

  async function startScanner() {
    const codeReader = new ZXing.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(null, video, (result, err) => {
      if (result) {
        const text = result.text;

        if (!scannedSet.has(text)) {
          scannedSet.add(text);

          if (navigator.vibrate) navigator.vibrate(100);

          const card = document.createElement('div');
          card.className = 'card';

          card.innerHTML = `
            <div>${text}</div>
            <div class="time">${getCurrentTime()}</div>
          `;

          // добавляем В НАЧАЛО
          list.prepend(card);

          updateCounter();
          showStatus('Сканировано', 'success');

        } else {
          if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
          showStatus('Дубликат', 'duplicate');
        }
      }
    });
  }

  function exportExcel() {
    const data = Array.from(scannedSet).map(code => [code]);

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Акцизы");

    XLSX.writeFile(wb, "excise_codes.xlsx");
  }

  startCamera().then(startScanner);
</script>

</body>
</html>
