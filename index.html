<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сканер акцизов</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@zxing/library@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }

    #video {
      width: 90vw;
      height: 90vw;
      max-width: 400px;
      max-height: 400px;
      margin-top: 10px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid #444;
    }

    button {
      margin: 10px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
    }

    /* Контейнер карточек */
    #list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    /* Карточка */
    .card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 10px;
      font-size: 12px;
      word-break: break-all;
      text-align: left;
      border: 1px solid #333;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

<h3>Сканер акцизных марок</h3>

<video id="video" autoplay muted playsinline></video>

<div>
  <button onclick="exportExcel()">Экспорт в Excel</button>
</div>

<div id="list"></div>

<script>
  const video = document.getElementById('video');
  const list = document.getElementById('list');

  const scannedSet = new Set();

  async function startCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    const track = stream.getVideoTracks()[0];
    const capabilities = track.getCapabilities();

    if (capabilities.zoom) {
      track.applyConstraints({
        advanced: [{ zoom: Math.min(capabilities.zoom.max, 2.5) }]
      });
    }
  }

  async function startScanner() {
    const codeReader = new ZXing.BrowserMultiFormatReader();

    codeReader.decodeFromVideoDevice(null, video, (result, err) => {
      if (result) {
        const text = result.text;

        if (!scannedSet.has(text)) {
          scannedSet.add(text);

          if (navigator.vibrate) {
            navigator.vibrate(100);
          }

          const card = document.createElement('div');
          card.className = 'card';
          card.textContent = text;

          list.appendChild(card);
        }
      }
    });
  }

  function exportExcel() {
    const data = Array.from(scannedSet).map(code => [code]);

    const ws = XLSX.utils.aoa_to_sheet(data);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Акцизы");

    XLSX.writeFile(wb, "excise_codes.xlsx");
  }

  startCamera().then(startScanner);
</script>

</body>
</html>
