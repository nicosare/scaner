<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акцизный сканер</title>
    <script src="https://unpkg.com/@zxing/library@0.19.0/umd/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 20px 16px 32px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0f2b3d, #1b4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .header p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }

        .camera-panel {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background-color: #111;
        }

        #videoElement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            border-radius: 24px;
        }

        .camera-controls {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: white;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            background: #eef2ff;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e40af;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1 0 auto;
            justify-content: center;
        }

        .btn-primary {
            background: #1e40af;
            color: white;
            box-shadow: 0 2px 8px rgba(30, 64, 175, 0.2);
        }

        .btn-primary:active {
            background: #1e3a8a;
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #334155;
        }

        .btn-outline:active {
            background: #f1f5f9;
        }

        .btn-export {
            background: #0f3b2c;
            color: white;
        }

        .list-section {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 8px 0;
            overflow: hidden;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 20px 8px;
            border-bottom: 1px solid #eef2ff;
        }

        .list-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .badge {
            background: #eef2ff;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e40af;
        }

        .scans-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            padding: 0;
        }

        .scan-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #f0f2f8;
            gap: 12px;
        }

        .code-text {
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 500;
            word-break: break-all;
            flex: 1;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #94a3b8;
            padding: 6px;
            border-radius: 40px;
        }

        .delete-btn:active {
            color: #ef4444;
            background: #fee2e2;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.8);
            max-width: 90vw;
            text-align: center;
        }

        .toast-msg.show {
            opacity: 1;
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>Акцизный сканер</h1>
        <p>Автоматическое распознавание марок и кодов ЧЗ</p>
    </div>

    <div class="camera-panel">
        <div class="video-wrapper">
            <video id="videoElement" autoplay playsinline muted></video>
            <canvas id="canvasOverlay"></canvas>
        </div>
        <div class="camera-controls">
            <button id="startCameraBtn" class="btn btn-primary">📷 Запустить камеру</button>
            <button id="stopCameraBtn" class="btn btn-outline" disabled>⏹️ Остановить</button>
            <button id="switchCameraBtn" class="btn btn-outline" disabled>🔄 Сменить камеру</button>
        </div>
    </div>

    <div class="list-section">
        <div class="list-header">
            <h2>Отсканированные коды</h2>
            <span id="countBadge" class="badge">0</span>
        </div>
        <ul id="scansList" class="scans-list">
            <li class="empty-state">✨ Отсканируйте акцизную марку или код Честного знака</li>
        </ul>
        <div style="padding: 16px 20px 20px; border-top: 1px solid #eef2ff;">
            <button id="exportExcelBtn" class="btn btn-export" style="width:100%">📎 Экспорт в Excel</button>
        </div>
    </div>
</div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    // DOM
    const video = document.getElementById('videoElement');
    const overlayCanvas = document.getElementById('canvasOverlay');
    const ctx = overlayCanvas.getContext('2d');
    const startBtn = document.getElementById('startCameraBtn');
    const stopBtn = document.getElementById('stopCameraBtn');
    const switchBtn = document.getElementById('switchCameraBtn');
    const scansListEl = document.getElementById('scansList');
    const countBadge = document.getElementById('countBadge');
    const exportBtn = document.getElementById('exportExcelBtn');
    const toastDiv = document.getElementById('toastMessage');

    // Состояние
    let scannedCodes = [];
    let currentReader = null;
    let currentStream = null;
    let isScanning = false;
    let currentCameraIndex = 0;          // 0 - задняя, 1 - фронтальная (если есть)
    let availableCameras = [];            // список устройств видео
    let frameTimer = null;

    // Утилиты
    function showToast(msg, duration = 2000) {
        toastDiv.textContent = msg;
        toastDiv.classList.add('show');
        setTimeout(() => toastDiv.classList.remove('show'), duration);
    }

    function updateList() {
        scansListEl.innerHTML = '';
        if (scannedCodes.length === 0) {
            scansListEl.innerHTML = '<li class="empty-state">📭 Нет отсканированных кодов. Наведите камеру на марку.</li>';
            countBadge.innerText = '0';
            return;
        }
        countBadge.innerText = scannedCodes.length;
        [...scannedCodes].reverse().forEach((item) => {
            const li = document.createElement('li');
            li.className = 'scan-item';
            const span = document.createElement('span');
            span.className = 'code-text';
            span.innerText = item.text;
            const delBtn = document.createElement('button');
            delBtn.innerText = '🗑️';
            delBtn.className = 'delete-btn';
            delBtn.onclick = () => {
                const idx = scannedCodes.findIndex(c => c.text === item.text && c.timestamp === item.timestamp);
                if (idx !== -1) {
                    scannedCodes.splice(idx, 1);
                    updateList();
                    showToast('Код удалён');
                }
            };
            li.appendChild(span);
            li.appendChild(delBtn);
            scansListEl.appendChild(li);
        });
    }

    function addCode(text) {
        if (!text || text.trim() === '') return false;
        const normalized = text.trim();
        if (scannedCodes.some(c => c.text === normalized)) return false;
        scannedCodes.unshift({ text: normalized, timestamp: Date.now() });
        updateList();
        const short = normalized.length > 28 ? normalized.slice(0, 26) + '…' : normalized;
        showToast(`✅ ${short}`);
        if (navigator.vibrate) navigator.vibrate(80);
        return true;
    }

    // Рисование зелёной рамки
    function drawBox(points) {
        if (!ctx || !overlayCanvas) return;
        const rect = overlayCanvas.parentElement.getBoundingClientRect();
        overlayCanvas.width = rect.width;
        overlayCanvas.height = rect.height;
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (!points || points.length < 3) return;

        const vw = video.videoWidth;
        const vh = video.videoHeight;
        if (vw === 0 || vh === 0) return;

        const sx = overlayCanvas.width / vw;
        const sy = overlayCanvas.height / vh;
        ctx.beginPath();
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 4;
        ctx.moveTo(points[0].x * sx, points[0].y * sy);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x * sx, points[i].y * sy);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = '#22c55e';
        ctx.globalAlpha = 0.2;
        ctx.fill();
        ctx.globalAlpha = 1;

        if (frameTimer) clearTimeout(frameTimer);
        frameTimer = setTimeout(() => {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }, 600);
    }

    function clearOverlay() {
        if (ctx) ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (frameTimer) clearTimeout(frameTimer);
    }

    // Получение списка камер и выбор задней по умолчанию
    async function getCameraDevices() {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');
        availableCameras = videoDevices;
        if (videoDevices.length === 0) throw new Error('Нет доступных камер');
        // Находим заднюю камеру (environment)
        const backIndex = videoDevices.findIndex(device => 
            device.label.toLowerCase().includes('back') || 
            device.label.toLowerCase().includes('environment')
        );
        if (backIndex !== -1) currentCameraIndex = backIndex;
        else currentCameraIndex = 0; // первая доступная
        return videoDevices;
    }

    // Остановка всего
    async function stopCamera() {
        isScanning = false;
        if (currentReader) {
            try { await currentReader.reset(); } catch(e) {}
            currentReader = null;
        }
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
        video.pause();
        clearOverlay();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        switchBtn.disabled = true;
        showToast('Камера остановлена');
    }

    // Запуск камеры с указанным устройством
    async function startWithDevice(deviceId) {
        if (currentStream) {
            // останавливаем предыдущий поток перед новым запросом
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = null;
        }
        const constraints = { video: { deviceId: { exact: deviceId }, facingMode: { exact: 'environment' } } };
        const stream = await navigator.mediaDevices.getUserMedia({ video: { deviceId: { exact: deviceId } } });
        currentStream = stream;
        video.srcObject = stream;
        await video.play();
        await new Promise(resolve => {
            if (video.videoWidth > 0) resolve();
            else video.onloadedmetadata = resolve;
        });
        // Настройка canvas
        const rect = overlayCanvas.parentElement.getBoundingClientRect();
        overlayCanvas.width = rect.width;
        overlayCanvas.height = rect.height;
        clearOverlay();

        // Инициализация сканера
        const { BrowserMultiFormatReader } = ZXing;
        const reader = new BrowserMultiFormatReader();
        currentReader = reader;
        isScanning = true;

        reader.decodeFromVideoElement(video, (result, err) => {
            if (!isScanning) return;
            if (result) {
                const text = result.getText();
                const points = result.getResultPoints();
                if (points && points.length) drawBox(points);
                addCode(text);
            }
            // Ошибки "код не найден" игнорируем
            if (err && err.name !== 'NotFoundException' && err.name !== 'ChecksumException') {
                console.warn(err);
            }
        }).catch(e => {
            console.error('ZXing error', e);
            if (isScanning) showToast('Ошибка сканера, перезапустите', 2000);
        });
    }

    // Основной запуск камеры (выбор первой/задней)
    async function startCamera() {
        if (isScanning) {
            showToast('Камера уже работает');
            return;
        }
        try {
            // Сначала запрашиваем разрешение через временный поток, чтобы получить лейблы
            let devices = await navigator.mediaDevices.enumerateDevices();
            if (devices.filter(d => d.kind === 'videoinput').length === 0) {
                // если нет устройств, запрашиваем разрешение, чтобы они появились
                const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tempStream.getTracks().forEach(t => t.stop());
                devices = await navigator.mediaDevices.enumerateDevices();
            }
            await getCameraDevices(); // заполняет availableCameras и currentCameraIndex
            if (availableCameras.length === 0) throw new Error('Камера не найдена');
            const deviceId = availableCameras[currentCameraIndex].deviceId;
            await startWithDevice(deviceId);
            startBtn.disabled = true;
            stopBtn.disabled = false;
            switchBtn.disabled = availableCameras.length < 2; // только если есть больше одной камеры
            showToast('Камера запущена. Наведите на марку.', 2000);
        } catch (error) {
            console.error(error);
            let msg = 'Не удалось получить доступ к камере. ';
            if (error.name === 'NotAllowedError') msg += 'Разрешение отклонено. Нажмите разрешить в браузере.';
            else if (error.name === 'NotFoundError') msg += 'Камера не найдена.';
            else if (error.name === 'NotReadableError') msg += 'Камера занята.';
            else msg += 'Проверьте, что сайт открыт по HTTPS и разрешён доступ.';
            showToast(msg, 5000);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            switchBtn.disabled = true;
        }
    }

    // Переключение камеры
    async function switchCamera() {
        if (!isScanning || availableCameras.length < 2) return;
        // переключить индекс
        currentCameraIndex = (currentCameraIndex + 1) % availableCameras.length;
        const newDeviceId = availableCameras[currentCameraIndex].deviceId;
        try {
            await startWithDevice(newDeviceId);
            showToast('Камера переключена', 1000);
        } catch (e) {
            showToast('Не удалось переключить камеру', 2000);
        }
    }

    // Экспорт в Excel
    function exportExcel() {
        if (scannedCodes.length === 0) {
            showToast('Нет данных для экспорта');
            return;
        }
        const content = scannedCodes.map(item => item.text).join('\n');
        const blob = new Blob([content], { type: 'application/vnd.ms-excel;charset=utf-8' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        const date = new Date();
        const filename = `акцизы_${date.toISOString().slice(0,19).replace(/:/g, '-')}.xls`;
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast(`Экспортировано ${scannedCodes.length} кодов`);
    }

    // События
    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
    switchBtn.addEventListener('click', switchCamera);
    exportBtn.addEventListener('click', exportExcel);

    // При загрузке страницы проверяем поддержку, но не запрашиваем камеру автоматически
    window.addEventListener('resize', () => {
        if (isScanning && overlayCanvas) {
            const rect = overlayCanvas.parentElement.getBoundingClientRect();
            overlayCanvas.width = rect.width;
            overlayCanvas.height = rect.height;
        }
    });

    updateList();
</script>
</body>
</html>
