<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Сканер акцизов</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

h3 {
  margin: 10px 0;
}

/* Камера */
#container {
  position: relative;
}

#video {
  width: 75vw;
  height: 75vw;
  max-width: 320px;
  max-height: 320px;
  border-radius: 16px;
  object-fit: cover;
  border: 3px solid #444;
}

/* Рамка */
#overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 65%;
  height: 65%;
  transform: translate(-50%, -50%);
  border: 3px solid #888;
  border-radius: 14px;
  transition: all 0.2s;
}

/* Индикация */
.flash-success {
  border-color: #00ff88 !important;
  box-shadow: 0 0 25px #00ff88;
  background: rgba(0,255,120,0.15);
}

.flash-error {
  border-color: #ff3b3b !important;
  box-shadow: 0 0 25px #ff3b3b;
  background: rgba(255,0,0,0.15);
}

/* Счётчик */
#counter {
  font-size: 20px;
  margin: 8px;
}

/* Кнопки */
button {
  margin: 6px;
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  background: #4CAF50;
  color: white;
}

/* Список */
#list {
  padding: 10px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 12px;
  margin-bottom: 10px;
  text-align: left;
}

.code {
  font-size: 13px;
  word-break: break-word;
  overflow-wrap: anywhere;
}

.time {
  font-size: 11px;
  color: #aaa;
  margin-top: 5px;
}
</style>
</head>

<body>

<h3>Сканер акцизных марок</h3>

<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <div id="overlay"></div>
</div>

<div id="counter">0</div>

<div>
  <button onclick="toggleTorch()">🔦 Фонарик</button>
  <button onclick="exportExcel()">Экспорт</button>
</div>

<div id="list"></div>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const list = document.getElementById('list');
const counter = document.getElementById('counter');

const scannedSet = new Set();

let track;
let torchOn = false;

let lastScan = "";
let lastTime = 0;

/* ВСПЫШКА */
function flash(type) {
  overlay.classList.remove('flash-success','flash-error');
  overlay.classList.add(type);

  setTimeout(()=>{
    overlay.classList.remove(type);
  }, 350);
}

function updateCounter() {
  counter.textContent = scannedSet.size;
}

function getTime() {
  return new Date().toLocaleString();
}

/* КАМЕРА */
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  video.srcObject = stream;
  track = stream.getVideoTracks()[0];

  const cap = track.getCapabilities();

  if (cap.zoom) {
    track.applyConstraints({
      advanced: [{ zoom: Math.min(cap.zoom.max, 2.5) }]
    });
  }
}

/* ФОНАРИК */
async function toggleTorch() {
  if (!track) return;

  const cap = track.getCapabilities();

  if (!cap.torch) {
    alert("Фонарик не поддерживается");
    return;
  }

  torchOn = !torchOn;

  await track.applyConstraints({
    advanced: [{ torch: torchOn }]
  });
}

/* СКАНЕР */
async function startScanner() {
  const reader = new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoDevice(null, video, (result) => {
    if (!result) return;

    const text = result.text;
    const now = Date.now();

    // анти-дребезг
    if (text === lastScan && now - lastTime < 1200) return;

    lastScan = text;
    lastTime = now;

    if (!scannedSet.has(text)) {
      scannedSet.add(text);

      // ✅ ВИБРАЦИЯ ТОЛЬКО ТУТ
      if (navigator.vibrate) {
        navigator.vibrate(200);
      }

      flash('flash-success');

      const card = document.createElement('div');
      card.className = 'card';

      card.innerHTML = `
        <div class="code">${text}</div>
        <div class="time">${getTime()}</div>
      `;

      list.prepend(card);
      updateCounter();

    } else {
      flash('flash-error');
    }
  });
}

/* ЭКСПОРТ */
function exportExcel() {
  const data = Array.from(scannedSet).map(x => [x]);

  const ws = XLSX.utils.aoa_to_sheet(data);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Акцизы");
  XLSX.writeFile(wb, "excise_codes.xlsx");
}

/* СТАРТ */
startCamera().then(startScanner);
</script>

</body>
</html>
