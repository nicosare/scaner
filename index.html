<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Акцизный сканер</title>
    <script src="https://unpkg.com/@zxing/library@0.19.0/umd/index.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fb;
            color: #1e293b;
            padding: 20px 16px 32px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 24px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0f2b3d, #1b4a6e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            font-size: 0.85rem;
            color: #5b6e8c;
            margin-top: 6px;
        }

        .camera-panel {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background-color: #111;
        }

        #videoElement {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            transform: scaleX(1);
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: none;
            border-radius: 24px;
        }

        .camera-controls {
            display: flex;
            gap: 12px;
            padding: 16px;
            background: white;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            border: none;
            background: #eef2ff;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e40af;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1 0 auto;
            justify-content: center;
        }

        .btn-primary {
            background: #1e40af;
            color: white;
            box-shadow: 0 2px 8px rgba(30, 64, 175, 0.2);
        }

        .btn-primary:active {
            background: #1e3a8a;
            transform: scale(0.97);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #334155;
        }

        .btn-outline:active {
            background: #f1f5f9;
        }

        .btn-export {
            background: #0f3b2c;
            color: white;
            box-shadow: 0 2px 8px rgba(15, 59, 44, 0.2);
        }

        .btn-export:active {
            background: #0a2c21;
        }

        .list-section {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            padding: 8px 0;
            overflow: hidden;
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 20px 8px;
            border-bottom: 1px solid #eef2ff;
        }

        .list-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f2b3d;
        }

        .badge {
            background: #eef2ff;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e40af;
        }

        .scans-list {
            list-style: none;
            max-height: 320px;
            overflow-y: auto;
            padding: 0;
        }

        .scan-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid #f0f2f8;
            transition: background 0.15s;
            gap: 12px;
        }

        .scan-item:active {
            background: #f8fafc;
        }

        .code-text {
            font-family: 'SF Mono', 'Menlo', monospace;
            font-size: 0.85rem;
            font-weight: 500;
            color: #0f172a;
            word-break: break-all;
            flex: 1;
            letter-spacing: 0.2px;
        }

        .delete-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #94a3b8;
            padding: 6px;
            border-radius: 40px;
            transition: 0.1s;
            line-height: 1;
        }

        .delete-btn:active {
            color: #ef4444;
            background: #fee2e2;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .toast-msg {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1000;
            white-space: normal;
            text-align: center;
            backdrop-filter: blur(8px);
            background: rgba(0,0,0,0.8);
            max-width: 90vw;
        }

        .toast-msg.show {
            opacity: 1;
        }

        .hidden {
            display: none !important;
        }

        button:disabled {
            opacity: 0.6;
            transform: none;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>Акцизный сканер</h1>
        <p>Автоматическое распознавание марок и кодов ЧЗ</p>
    </div>

    <div class="camera-panel">
        <div class="video-wrapper">
            <video id="videoElement" autoplay playsinline muted></video>
            <canvas id="canvasOverlay"></canvas>
        </div>
        <div class="camera-controls">
            <button id="startCameraBtn" class="btn btn-primary">📷 Запустить камеру</button>
            <button id="stopCameraBtn" class="btn btn-outline" disabled>⏹️ Остановить</button>
        </div>
    </div>

    <div class="list-section">
        <div class="list-header">
            <h2>Отсканированные коды</h2>
            <span id="countBadge" class="badge">0</span>
        </div>
        <ul id="scansList" class="scans-list">
            <li class="empty-state">✨ Отсканируйте акцизную марку или код Честного знака</li>
        </ul>
        <div style="padding: 16px 20px 20px; border-top: 1px solid #eef2ff;">
            <button id="exportExcelBtn" class="btn btn-export" style="width:100%">📎 Экспорт в Excel</button>
        </div>
    </div>
</div>
<div id="toastMessage" class="toast-msg"></div>

<script>
    // DOM элементы
    const video = document.getElementById('videoElement');
    const overlayCanvas = document.getElementById('canvasOverlay');
    const ctx = overlayCanvas.getContext('2d');
    const startBtn = document.getElementById('startCameraBtn');
    const stopBtn = document.getElementById('stopCameraBtn');
    const scansListEl = document.getElementById('scansList');
    const countBadge = document.getElementById('countBadge');
    const exportBtn = document.getElementById('exportExcelBtn');
    const toastDiv = document.getElementById('toastMessage');

    // Состояние
    let scannedCodes = [];
    let currentReader = null;
    let currentStream = null;
    let isScanningActive = false;
    let frameTimer = null;

    // Утилиты
    function showToast(msg, duration = 2000) {
        toastDiv.textContent = msg;
        toastDiv.classList.add('show');
        setTimeout(() => toastDiv.classList.remove('show'), duration);
    }

    function updateList() {
        scansListEl.innerHTML = '';
        if (scannedCodes.length === 0) {
            const emptyLi = document.createElement('li');
            emptyLi.className = 'empty-state';
            emptyLi.innerText = '📭 Нет отсканированных кодов. Наведите камеру на марку.';
            scansListEl.appendChild(emptyLi);
            countBadge.innerText = '0';
            return;
        }
        countBadge.innerText = scannedCodes.length;
        // Новые сверху
        [...scannedCodes].reverse().forEach((item) => {
            const li = document.createElement('li');
            li.className = 'scan-item';
            const span = document.createElement('span');
            span.className = 'code-text';
            span.innerText = item.text;
            const delBtn = document.createElement('button');
            delBtn.innerText = '🗑️';
            delBtn.className = 'delete-btn';
            delBtn.onclick = (e) => {
                e.stopPropagation();
                const idx = scannedCodes.findIndex(c => c.text === item.text && c.timestamp === item.timestamp);
                if (idx !== -1) {
                    scannedCodes.splice(idx, 1);
                    updateList();
                    showToast('Код удалён');
                }
            };
            li.appendChild(span);
            li.appendChild(delBtn);
            scansListEl.appendChild(li);
        });
    }

    function addCode(text) {
        if (!text || text.trim() === '') return false;
        const normalized = text.trim();
        if (scannedCodes.some(c => c.text === normalized)) return false;
        scannedCodes.unshift({ text: normalized, timestamp: Date.now() });
        updateList();
        showToast(`✅ ${normalized.length > 28 ? normalized.slice(0, 26) + '…' : normalized}`);
        if (window.navigator && window.navigator.vibrate) navigator.vibrate(80);
        return true;
    }

    // Рисование рамки
    function drawBox(points) {
        if (!ctx || !overlayCanvas) return;
        const rect = overlayCanvas.parentElement.getBoundingClientRect();
        overlayCanvas.width = rect.width;
        overlayCanvas.height = rect.height;
        ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (!points || points.length < 3) return;

        const videoWidth = video.videoWidth;
        const videoHeight = video.videoHeight;
        if (videoWidth === 0 || videoHeight === 0) return;

        const scaleX = overlayCanvas.width / videoWidth;
        const scaleY = overlayCanvas.height / videoHeight;

        ctx.beginPath();
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 4;
        const first = points[0];
        ctx.moveTo(first.x * scaleX, first.y * scaleY);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x * scaleX, points[i].y * scaleY);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.fillStyle = '#22c55e';
        ctx.globalAlpha = 0.2;
        ctx.fill();
        ctx.globalAlpha = 1;

        if (frameTimer) clearTimeout(frameTimer);
        frameTimer = setTimeout(() => {
            ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }, 600);
    }

    function clearOverlay() {
        if (ctx && overlayCanvas) ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (frameTimer) clearTimeout(frameTimer);
    }

    // Остановка всего
    async function stopCamera() {
        if (!isScanningActive && !currentStream && !currentReader) return;
        isScanningActive = false;

        if (currentReader) {
            try {
                await currentReader.reset();
            } catch(e) { console.warn(e); }
            currentReader = null;
        }
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            currentStream = null;
        }
        video.srcObject = null;
        video.pause();
        clearOverlay();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        showToast('Камера остановлена');
    }

    // Запуск
    async function startCamera() {
        if (isScanningActive) {
            showToast('Камера уже работает');
            return;
        }

        try {
            // 1. Запрашиваем доступ
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            currentStream = stream;
            video.srcObject = stream;
            await video.play();

            // Ждём метаданных
            await new Promise((resolve) => {
                if (video.videoWidth > 0) resolve();
                else video.onloadedmetadata = () => resolve();
            });

            // 2. Инициализируем сканер
            const { BrowserMultiFormatReader } = ZXing;
            const reader = new BrowserMultiFormatReader();
            currentReader = reader;

            // Устанавливаем флаг, что сканирование активно
            isScanningActive = true;

            // Запускаем непрерывное сканирование без await (чтобы не блокировать)
            reader.decodeFromVideoElement(video, (result, err) => {
                if (!isScanningActive) return;
                if (result) {
                    const text = result.getText();
                    // Рамка
                    const points = result.getResultPoints();
                    if (points && points.length) drawBox(points);
                    addCode(text);
                }
                // Игнорируем ошибки "не найден код"
                if (err && err.name !== 'NotFoundException' && err.name !== 'ChecksumException') {
                    console.warn('ZXing error:', err);
                }
            }).catch(e => {
                console.error('ZXing decode error:', e);
                if (isScanningActive) {
                    showToast('Ошибка сканера. Перезапустите камеру.', 2500);
                    stopCamera();
                }
            });

            startBtn.disabled = true;
            stopBtn.disabled = false;
            showToast('Камера готова. Наведите на акцизную марку.', 2000);
            clearOverlay();

        } catch (error) {
            console.error('Camera start error:', error);
            let msg = 'Не удалось получить доступ к камере. ';
            if (error.name === 'NotAllowedError') msg += 'Разрешение отклонено. Проверьте настройки сайта.';
            else if (error.name === 'NotFoundError') msg += 'Камера не найдена.';
            else if (error.name === 'NotReadableError') msg += 'Камера занята другим приложением.';
            else msg += 'Убедитесь, что сайт открыт по HTTPS и разрешён доступ.';
            showToast(msg, 4000);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            if (currentStream) {
                currentStream.getTracks().forEach(t => t.stop());
                currentStream = null;
            }
            isScanningActive = false;
        }
    }

    // Экспорт в Excel (простой текстовый файл .xls)
    function exportExcel() {
        if (scannedCodes.length === 0) {
            showToast('Нет данных для экспорта', 1500);
            return;
        }
        let content = scannedCodes.map(item => item.text).join('\n');
        const blob = new Blob([content], { type: 'application/vnd.ms-excel;charset=utf-8' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        const date = new Date();
        const filename = `акцизы_${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}.xls`;
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast(`Экспортировано ${scannedCodes.length} кодов`);
    }

    // События
    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
    exportBtn.addEventListener('click', exportExcel);

    // Адаптация canvas при изменении размера
    window.addEventListener('resize', () => {
        if (isScanningActive && overlayCanvas) {
            const rect = overlayCanvas.parentElement.getBoundingClientRect();
            overlayCanvas.width = rect.width;
            overlayCanvas.height = rect.height;
        }
    });

    updateList();
</script>
</body>
</html>
